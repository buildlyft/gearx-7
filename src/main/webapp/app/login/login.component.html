<div>
  <div class="d-flex justify-content-center">
    <div class="col-lg-6 col-md-8 col-sm-10">
      <h1 data-cy="loginTitle">Sign in</h1>

      @if (authenticationError) {
        <div class="alert alert-danger" data-cy="loginError">
          <strong>Failed to sign in!</strong> Please check your credentials and try again.
        </div>
      }

      <form class="form" role="form" (ngSubmit)="login()" [formGroup]="loginForm">
        <div class="mb-3">
          <label class="form-label" for="username"> Phone Number </label>

          <div class="input-group">
            <input
              type="text"
              class="form-control"
              id="username"
              placeholder="Enter Phone Number"
              formControlName="username"
              #username
              required
            />
          </div>

          <div class="mt-2">
            <button
              type="button"
              class="btn btn-primary me-2"
              [disabled]="otpSent || !loginForm.get('username')?.value"
              (click)="customerLogin()"
            >
              Customer Login
            </button>

            <button
              type="button"
              class="btn btn-success"
              [disabled]="otpSent || !loginForm.get('username')?.value"
              (click)="partnerLogin()"
            >
              Partner Login
            </button>
          </div>
        </div>

        @if (otpSent) {
          <div class="mb-3">
            <label class="form-label"> OTP </label>

            <input type="text" class="form-control" formControlName="otp" placeholder="Enter OTP" />
          </div>
        }

        <div class="form-check mb-3">
          <label class="form-check-label" for="rememberMe">
            <input class="form-check-input" type="checkbox" id="rememberMe" formControlName="rememberMe" />
            <span>Remember me</span>
          </label>
        </div>

        <button type="submit" class="btn btn-primary" [disabled]="!otpSent">Login</button>
      </form>

      <div class="mt-3 alert alert-warning">
        <a class="alert-link" routerLink="/account/reset/request" data-cy="forgetYourPasswordSelector"> Did you forget your password? </a>
      </div>

      <div class="alert alert-warning">
        <span>You don't have an account yet?</span>
        <a class="alert-link" routerLink="/account/register"> Register a new account </a>
      </div>
    </div>
  </div>
</div>
