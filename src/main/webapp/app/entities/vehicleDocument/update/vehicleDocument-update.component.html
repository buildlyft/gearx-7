<div class="row justify-content-center">
  <div class="col-8">
    <h2>Upload / Update Vehicle Documents</h2>

    <form>
      <!-- Machine Select -->
      <div class="mb-3">
        <label class="form-label">Machine</label>
        <select class="form-control" [(ngModel)]="machineId" name="machineId" required>
          <option [ngValue]="null">Select Machine</option>
          <option *ngFor="let machine of machines" [ngValue]="machine.id">
            {{ machine.brand }} {{ machine.model }} ({{ machine.id }})
          </option>
        </select>
      </div>

      <!-- File Upload -->
      <div class="mb-3">
        <label class="form-label">Upload Documents</label>
        <input type="file" multiple class="form-control" (change)="onFileSelect($event)" accept=".jpg,.jpeg,.png,.pdf,.docx" />
      </div>

      <!-- Selected Files -->
      <div *ngIf="filePreviews.length > 0" class="mb-3">
        <h6>Selected Files ({{ filePreviews.length }})</h6>

        <div class="row">
          <div *ngFor="let file of filePreviews; let i = index" class="col-md-4 mb-3">
            <div class="card p-2 text-center">
              <!-- Image Preview -->
              <img
                *ngIf="file.url && file.type.startsWith('image/')"
                [src]="file.url"
                style="height: 120px; object-fit: cover; border-radius: 6px"
              />

              <!-- PDF Preview -->
              <div *ngIf="file.type === 'application/pdf'">
                <fa-icon icon="file-pdf" size="3x"></fa-icon>
                <p>PDF Document</p>
              </div>

              <!-- DOCX Preview -->
              <div *ngIf="file.type.includes('word')">
                <fa-icon icon="file-word" size="3x"></fa-icon>
                <p>Word Document</p>
              </div>

              <small class="mt-2">{{ file.name }}</small>

              <button type="button" class="btn btn-sm btn-outline-danger mt-2" (click)="removeFile(i)">Remove</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Buttons -->
      <div class="d-flex justify-content-end gap-2">
        <button type="button" class="btn btn-secondary" (click)="previousState()" [disabled]="isSaving">Back</button>

        <button type="button" class="btn btn-primary" (click)="save()" [disabled]="isSaving || !machineId || selectedFiles.length === 0">
          <span *ngIf="isSaving">Uploading...</span>
          <span *ngIf="!isSaving">Upload Documents</span>
        </button>
      </div>
    </form>
  </div>
</div>
